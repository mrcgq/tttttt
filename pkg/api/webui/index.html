<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TLS-Client 控制面板 v3.5</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="app">
  <!-- ============ 侧边栏 ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🛡️</span>
      <div class="logo-text">
        <h1>TLS-Client</h1>
        <span class="logo-version">v3.5 控制面板</span>
      </div>
      <button class="sidebar-collapse-btn" id="sidebar-toggle" title="折叠">☰</button>
    </div>
    <nav class="sidebar-nav" id="main-nav">
      <a class="nav-link active" data-page="dashboard" href="#dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>仪表盘</span>
      </a>
      <a class="nav-link" data-page="nodes" href="#nodes">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
        <span>节点管理</span>
      </a>
      <a class="nav-link" data-page="fingerprint" href="#fingerprint">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0110 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/><path d="M12 6a6 6 0 016 6"/><path d="M12 10a2 2 0 012 2"/></svg>
        <span>指纹实验室</span>
      </a>
      <a class="nav-link" data-page="transport" href="#transport">
        <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z"/><path d="M22 6l-10 7L2 6"/></svg>
        <span>传输层</span>
      </a>
      <a class="nav-link" data-page="cadence" href="#cadence">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span>时序控制</span>
      </a>
      <a class="nav-link" data-page="inbound" href="#inbound">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 00-9-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        <span>入站代理</span>
      </a>
      <a class="nav-link" data-page="logs" href="#logs">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8m8 4H8m2-8H8"/></svg>
        <span>日志</span>
      </a>
      <a class="nav-link" data-page="config" href="#config">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        <span>配置导出</span>
      </a>
      <a class="nav-link" data-page="apiconn" href="#apiconn">
        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        <span>API 连接</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="api-indicator" id="global-api-indicator">
        <span class="indicator-dot disconnected"></span>
        <span class="indicator-text">API 未连接</span>
      </div>
    </div>
  </aside>

  <!-- ============ 主区域 ============ -->
  <main class="main" id="main-content">
    <header class="topbar">
      <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
      <div class="topbar-title" id="topbar-title">仪表盘</div>
      <div class="topbar-actions">
        <span class="topbar-clock" id="topbar-clock"></span>
      </div>
    </header>
    <div class="page-container" id="page-container">
      <!-- 页面由 JS 动态渲染 -->
    </div>
  </main>
</div>

<!-- ============ 模态框容器 ============ -->
<div class="modal-overlay" id="modal-overlay"></div>
<div class="modal" id="modal-container"></div>

<!-- ============ Toast 通知 ============ -->
<div class="toast-container" id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/nodes.js"></script>
<script src="js/pages/fingerprint.js"></script>
<script src="js/pages/transport.js"></script>
<script src="js/pages/cadence.js"></script>
<script src="js/pages/inbound.js"></script>
<script src="js/pages/logs.js"></script>
<script src="js/pages/config.js"></script>
<script src="js/pages/apiconn.js"></script>
<script src="js/app.js"></script>
</body>
</html>
