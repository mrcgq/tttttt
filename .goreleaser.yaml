version: 2

builds:
  - id: tls-client
    main: ./cmd/tls-client/
    binary: tls-client
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin, windows, freebsd]
    goarch: [amd64, arm64, arm, mipsle, mips64le]
    goarm: ["7"]
    gomips: [softfloat]
    ignore:
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: mipsle
      - goos: darwin
        goarch: mips64le
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: mipsle
      - goos: windows
        goarch: mips64le
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
      - goos: freebsd
        goarch: mipsle
      - goos: freebsd
        goarch: mips64le

  - id: fpserver
    main: ./tools/fpserver/
    binary: fpserver
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos: [linux, darwin, windows, freebsd]
    goarch: [amd64, arm64, arm, mipsle, mips64le]
    goarm: ["7"]
    gomips: [softfloat]
    ignore:
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: mipsle
      - goos: darwin
        goarch: mips64le
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: mipsle
      - goos: windows
        goarch: mips64le
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
      - goos: freebsd
        goarch: mipsle
      - goos: freebsd
        goarch: mips64le

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: YOUR_GITHUB_USERNAME
    name: tls-client
  draft: false
  prerelease: auto
