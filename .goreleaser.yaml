version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: tls-client
    main: ./cmd/tls-client/
    binary: tls-client
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    targets: &all_targets
      # ============ Linux 全架构 ============
      - linux_amd64_v1
      - linux_386
      - linux_arm64
      - linux_arm_5
      - linux_arm_6
      - linux_arm_7
      - linux_mips_softfloat
      - linux_mipsle_softfloat
      - linux_mips64_softfloat
      - linux_mips64le_softfloat
      - linux_riscv64
      - linux_s390x
      - linux_ppc64
      - linux_ppc64le
      - linux_loong64
      # ============ macOS ============
      - darwin_amd64_v1
      - darwin_arm64
      # ============ Windows ============
      - windows_amd64_v1
      - windows_386
      - windows_arm64
      - windows_arm_7
      # ============ FreeBSD ============
      - freebsd_amd64_v1
      - freebsd_386
      - freebsd_arm64
      - freebsd_arm_7
      - freebsd_riscv64
      # ============ OpenBSD ============
      - openbsd_amd64_v1
      - openbsd_386
      - openbsd_arm64
      - openbsd_arm_7
      # ❌ 移除: openbsd_mips64 - Go 1.24 交叉编译存在 bug
      # ============ NetBSD ============
      - netbsd_amd64_v1
      - netbsd_386
      - netbsd_arm64
      - netbsd_arm_7
      # ============ DragonFly BSD ============
      - dragonfly_amd64_v1
      # ============ Solaris / Illumos ============
      - solaris_amd64_v1

  - id: fpserver
    main: ./tools/fpserver/
    binary: fpserver
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets: *all_targets

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}
    files:
      - README.md
      - LICENSE*
      - configs/example.yaml

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
