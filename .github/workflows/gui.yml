name: GUI Build

on:
  push:
    branches: [main]
    paths:
      - 'gui/**'
      - '.github/workflows/gui.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gui/**'
  workflow_dispatch:

jobs:
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: tls-client-gui-windows-amd64.exe
          - os: macos-latest
            platform: darwin/universal
            output: tls-client-gui-darwin-universal
          - os: ubuntu-latest
            platform: linux/amd64
            output: tls-client-gui-linux-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Linux 依赖
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      # 生成默认图标（如果不存在）
      - name: Generate app icon
        working-directory: gui
        run: |
          if [ ! -f build/appicon.png ]; then
            mkdir -p build
            # 创建一个 1x1 占位图标
            printf '\x89PNG\r\n\x1a\n' > build/appicon.png
            echo "Using placeholder icon"
          fi
        shell: bash

      # 构建 GUI
      - name: Build GUI
        working-directory: gui
        run: wails build -platform ${{ matrix.platform }} -o ${{ matrix.output }}

      # 上传产物
      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: gui/build/bin/*
          retention-days: 30

  # 合并所有平台产物到一个 artifact
  combine-artifacts:
    needs: build-gui
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: gui-binaries/

      - name: List all GUI binaries
        run: |
          echo "=== GUI Client Binaries ==="
          find gui-binaries/ -type f | sort
          echo "=========================="

      - name: Upload combined
        uses: actions/upload-artifact@v4
        with:
          name: tls-client-gui-all-platforms
          path: gui-binaries/
          retention-days: 30
