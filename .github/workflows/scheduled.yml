name: Scheduled

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  vuln-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run vulnerability check
        run: govulncheck ./...
      - name: Check for outdated dependencies
        run: |
          echo "=== Checking for available updates ==="
          go list -m -u all 2>&1 | grep '\[' || echo "All dependencies up to date"

  fingerprint-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check fingerprint data age
        run: |
          echo "=== Fingerprint Profile Freshness Check ==="
          for f in pkg/fingerprint/chrome.go pkg/fingerprint/firefox.go pkg/fingerprint/safari.go pkg/fingerprint/edge.go; do
            if [ -f "$f" ]; then
              echo "Checking $f"
            fi
          done

  expected-values-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Validate expected fingerprints
        run: |
          go run ./tools/validate-fingerprints/ -expected testdata/expected_fingerprints.json || true
