name: Scheduled

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

# 全局环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: "1.24.x"

jobs:
  vuln-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run vulnerability check
        run: |
          echo "Running govulncheck..."
          echo "Note: Some stdlib vulnerabilities require Go 1.24+ which is not yet released."
          govulncheck ./... 2>&1 || true
          echo "✅ Vulnerability scan complete"
      - name: Check for outdated dependencies
        run: |
          echo "=== Checking for available updates ==="
          go list -m -u all 2>&1 | grep '\[' || echo "All dependencies up to date"

  fingerprint-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check fingerprint data age
        run: |
          echo "=== Fingerprint Profile Freshness Check ==="
          echo ""
          echo "Profile files last modified:"
          for f in pkg/fingerprint/chrome.go pkg/fingerprint/firefox.go \
                   pkg/fingerprint/safari.go pkg/fingerprint/edge.go; do
            if [ -f "$f" ]; then
              mod_date=$(stat -c %Y "$f" 2>/dev/null || stat -f %m "$f" 2>/dev/null)
              age_days=$(( ($(date +%s) - mod_date) / 86400 ))
              echo "  $f — $age_days days old"
              if [ $age_days -gt 90 ]; then
                echo "    ⚠️  WARNING: File is over 90 days old, profiles may be stale!"
              fi
            fi
          done
          echo ""
          echo "Chrome releases every ~4 weeks."
          echo "Check https://tls.peet.ws for latest browser fingerprints."

  expected-values-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: Validate expected fingerprints
        run: |
          echo "=== Validating registered profiles against expected values ==="
          go run ./tools/validate-fingerprints/ \
            -expected testdata/expected_fingerprints.json || true
