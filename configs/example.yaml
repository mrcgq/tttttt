# tls-client configuration — Phase 3+ Upgraded
global:
  log_level: info
  log_output: stderr        # or "file:/var/log/tls-client.log"
  metrics:
    enabled: false
    endpoint: "127.0.0.1:9091"

inbound:
  socks5:
    listen: 127.0.0.1:1080
  http:
    listen: 127.0.0.1:8080

fingerprint:
  rotation:
    mode: fixed              # fixed | random | per-domain | weighted | timed
    profile: chrome-126-win  # default profile for fixed mode
    # profiles:              # for rotation modes:
    #   - chrome-126-win
    #   - firefox-127-win
    #   - safari-175-mac
    # interval: "5m"         # for timed mode

tls:
  verify_mode: sni-skip      # strict | sni-skip | insecure | pin
  # verify_opts:
  #   cert_pin: "ab12cd34..."  # SHA256 of leaf cert (for pin mode)
  #   custom_ca: "/path/to/ca.pem"

nodes:
  # ============================================================
  # Cloudflare Worker with WebSocket transport (PRIMARY)
  # ============================================================
  - name: cf-worker
    address: "104.16.132.229:443"                # CF optimized IP
    sni: "${CF_WORKER_DOMAIN}"                   # Environment variable
    transport: ws
    transport_opts:
      ws_path: "/"
      ws_host: "${CF_WORKER_DOMAIN}"
    retry:
      max_attempts: 3
      base_delay: "500ms"
      max_delay: "5s"
    pool:
      max_idle: 5
      idle_timeout: "120s"
      max_lifetime: "10m"
    active: true

  # ============================================================
  # Self-hosted VPS with raw CONNECT (BACKUP)
  # ============================================================
  # - name: my-vps
  #   address: "45.67.89.100:443"
  #   sni: "cover-domain.com"
  #   transport: raw
  #   fingerprint: firefox-127-win    # override global fingerprint
  #   active: false
