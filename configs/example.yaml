# tls-client configuration
global:
  log_level: info
  log_output: stderr
  metrics:
    enabled: false
    endpoint: "127.0.0.1:9091"

inbound:
  socks5:
    listen: 127.0.0.1:1080
  http:
    listen: 127.0.0.1:8080

fingerprint:
  rotation:
    mode: fixed
    profile: chrome-126-win

tls:
  verify_mode: sni-skip

nodes:
  - name: cf-worker
    address: "104.16.132.229:443"
    sni: "your-worker.example.workers.dev"
    transport: ws
    transport_opts:
      ws_path: "/"
      ws_host: "your-worker.example.workers.dev"
    retry:
      max_attempts: 3
      base_delay: "500ms"
      max_delay: "5s"
    pool:
      max_idle: 5
      idle_timeout: "120s"
      max_lifetime: "10m"
    active: true
